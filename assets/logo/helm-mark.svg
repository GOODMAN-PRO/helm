<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Helm mark">
  <title>Helm</title>
  <g fill="none" stroke="#111418" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- spokes + handle pegs (8, radiating past the ring) -->
    <g>
      <line x1="100" y1="100" x2="100" y2="6"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(45 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(90 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(135 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(180 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(225 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(270 100 100)"/>
      <line x1="100" y1="100" x2="100" y2="6" transform="rotate(315 100 100)"/>
    </g>
    <!-- outer wheel ring -->
    <circle cx="100" cy="100" r="62" stroke-width="11"/>
  </g>
  <!-- hub -->
  <circle cx="100" cy="100" r="20" fill="#111418"/>
  <circle cx="100" cy="100" r="7.5" fill="#2DD4BF"/>
</svg>
